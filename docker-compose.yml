version: '3.8'

services:
  ca1:
    build: ./ca
    container_name: ca1
    hostname: ca1.fis.epn.ec
    networks:
      - fis-net
    volumes:
      - ca-data:/etc/fis-ca

  idm1:
    build: ./idm1
    container_name: idm1
    # Modificado a FQDN para que Kerberos/kprop resuelvan correctamente el host
    hostname: idm1.fis.epn.ec
    domainname: fis.epn.ec
    environment:
      - NODE_ROLE=master
      - FQDN=idm1.fis.epn.ec
      - REALM=${REALM}
      - LDAP_BASE_DN=${LDAP_BASE_DN}
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
      - KRB5_ADMIN_PASSWORD=${KRB5_ADMIN_PASSWORD}
      - KRB5_USER_DEFAULT_PASSWORD=${KRB5_USER_DEFAULT_PASSWORD}
    ports:
      - "88:88/tcp"    # KDC Kerberos Principal TCP
      - "88:88/udp"    # KDC Kerberos Principal UDP
      - "749:749/tcp"  # Servidor de administración de Kerberos (kadmind)
    networks:
      fis-net:
        aliases:
          - idm1.fis.epn.ec
          - idm1
    volumes:
      - idm1-ldap-data:/var/lib/ldap
      - idm1-ldap-config:/etc/ldap/slapd.d
      - idm1-krb5-data:/var/lib/krb5kdc
      - ca-data:/etc/fis-ca:ro
      - krb5-shared:/etc/krb5kdc/shared
    depends_on:
      - ca1

  idm2:
    build: ./idm1
    container_name: idm2
    # Modificado a FQDN para que Kerberos/kprop resuelvan correctamente el host
    hostname: idm2.fis.epn.ec
    domainname: fis.epn.ec
    environment:
      - NODE_ROLE=replica
      - FQDN=idm2.fis.epn.ec
      - REALM=${REALM}
      - LDAP_BASE_DN=${LDAP_BASE_DN}
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
      - KRB5_ADMIN_PASSWORD=${KRB5_ADMIN_PASSWORD}
      - KRB5_USER_DEFAULT_PASSWORD=${KRB5_USER_DEFAULT_PASSWORD}
    ports:
      - "1088:88/tcp"  # KDC Kerberos Réplica TCP
      - "1088:88/udp"  # KDC Kerberos Réplica UDP
      - "754:754/tcp"  # kpropd Replicación de Kerberos
    networks:
      fis-net:
        aliases:
          - idm2.fis.epn.ec
          - idm2
    volumes:
      - idm2-ldap-data:/var/lib/ldap
      - idm2-ldap-config:/etc/ldap/slapd.d
      - idm2-krb5-data:/var/lib/krb5kdc
      - ca-data:/etc/fis-ca:ro
      - krb5-shared:/etc/krb5kdc/shared
    depends_on:
      - idm1

  lb1:
    image: haproxy:2.4-alpine
    container_name: lb1
    hostname: lb1
    ports:
      - "389:389"
      - "636:636"
    networks:
      fis-net:
        aliases:
          - ldap.fis.epn.ec
          - ldap.fis.epn.edu.ec
    volumes:
      - ./lb/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - idm1
      - idm2

networks:
  fis-net:
    driver: bridge

volumes:
  ca-data:
  idm1-ldap-data:
  idm1-ldap-config:
  idm1-krb5-data:
  idm2-ldap-data:
  idm2-ldap-config:
  idm2-krb5-data:
  krb5-shared: